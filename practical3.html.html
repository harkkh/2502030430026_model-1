<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Form</title>
    <link rel="stylesheet" href="pr3.css">
    <style>
        .demo {
            width: 300px;
            padding: 20px;
            border: 1px solid black;
            background-color: lightyellow;
        }
        #a{
            color:rgb(7, 7, 7);
            font-family:cursive;
        }
        input{
            font-family:cursive;
        }

    </style>

</head>
<body>

<form class="demo">
    <h2 style="  text-align: center;
            color: green;
        ">Login Form</h2>

    <label>Username:</label><br>
    <input id="a" type="text" placeholder="ENTER YOUR NAME"><br><br>

    <label>Password:</label><br>
    <input type="password" placeholder="ENTER YOUR Password"><br><br>

    <input type="submit" value="Login">
</form>

</body>
</html>
